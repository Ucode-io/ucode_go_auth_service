syntax="proto3";

package company_service;
option go_package="genproto/company_service";

import "google/protobuf/empty.proto";
import "company.proto";

service BillingService {
  // Fare Methods
  rpc CreateFare(CreateFareRequest) returns (Fare);
  rpc GetFare(PrimaryKey) returns (Fare);
  rpc ListFares(ListRequest) returns (ListFareResponse);
  rpc UpdateFare(Fare) returns (Fare);
  rpc DeleteFare(PrimaryKey) returns (google.protobuf.Empty);
  rpc CalculatePrice(CalculatePriceRequest) returns (CalculatePriceResponse);

  // Fare Item Methods
  rpc CreateFareItem(CreateFareItemRequest) returns (FareItem);
  rpc GetFareItem(PrimaryKey) returns (FareItem);
  rpc ListFareItems(ListRequest) returns (ListFareItemsResponse);
  rpc UpdateFareItem(FareItem) returns (FareItem);
  rpc DeleteFareItem(PrimaryKey) returns (google.protobuf.Empty);

  // Transaction Methods
  rpc CreateTransaction(CreateTransactionRequest) returns (Transaction);
  rpc GetTransaction(PrimaryKey) returns (Transaction);
  rpc ListTransactions(ListRequest) returns (ListTransactionsResponse);
  rpc UpdateTransaction(Transaction) returns (Transaction);

  // Compare
  rpc CompareFunction(CompareFunctionRequest) returns (CompareFunctionResponse);
  rpc UpsertMonthlyRequest(MonthlyRequest) returns (google.protobuf.Empty);

  // Payme
  rpc CreateCard(CreateProjectCardRequest) returns (ProjectCard);
  rpc GetProjectCard(PrimaryKey) returns (ProjectCard);
  rpc GetVerifyCode(GetVerifyCodeRequest) returns (GetVerifyCodeResponse);
  rpc Verify(VerifyRequest) returns (ProjectCard);
  rpc UpdateProjectCard(ProjectCard) returns (ProjectCard);
  rpc ListProjectCards(ListRequest) returns (ListProjectCardsResponse);
  rpc ReceiptPay(ReceiptPayRequest) returns (ReceiptPayResponse);
  rpc DeleteProjectCard(PrimaryKey) returns (google.protobuf.Empty);

  // Subscription
  rpc GetSubscription(PrimaryKey) returns (Subscription);
  rpc UpdateSubscription(Subscription) returns (Subscription);
  rpc CancelSubscription(CancelSubscriptionRequest) returns (Subscription);
  rpc GetProjectBillingStatus(GetProjectBillingStatusRequest) returns (GetProjectBillingStatusResponse);

  //Discount
  rpc ListDiscounts(ListRequest) returns (ListDiscountsResponse);
  rpc ListBillingPeriods(ListBillingPeriodsRequest) returns (ListBillingPeriodsResponse);

  rpc UpdateSubscriptionEndDate(UpdateSubscriptionEndDateReq) returns (UpdateSubscriptionEndDateResp);

  rpc GetPricingLimits(GetPricingLimitsRequest) returns (GetPricingLimitsResponse);
  rpc LogUsage(LogUsageRequest) returns (google.protobuf.Empty);

  rpc GetApiCallMonitoringMetrics(GetApiCallMonitoringMetricsRequest) returns (GetApiCallMonitoringMetricsResponse);

  rpc RecordAiTokenUsage(RecordAiTokenUsageRequest) returns (google.protobuf.Empty);

  rpc GetAiTokenUsageMetrics(GetAiTokenUsageMetricsRequest) returns (GetAiTokenUsageMetricsResponse);

  // Token packs (add-on consumable AI-token balance)
  rpc ListTokenPacks(ListTokenPacksRequest) returns (ListTokenPacksResponse);
  rpc CreateTokenPack(CreateTokenPackRequest) returns (TokenPack);
  rpc UpdateTokenPack(TokenPack) returns (TokenPack);
  rpc DeleteTokenPack(PrimaryKey) returns (google.protobuf.Empty);
  rpc PurchaseTokenPack(PurchaseTokenPackRequest) returns (PurchaseTokenPackResponse);
  rpc GetTokenPackBalance(GetTokenPackBalanceRequest) returns (GetTokenPackBalanceResponse);

  // Generic project balance charge/refund (funds paid actions such as using a
  // paid Ugen template). Charge is atomic and overdraft-checked against
  // balance + credit_limit; refund is its compensating reverse.
  rpc ChargeProjectBalance(ChargeProjectBalanceRequest) returns (ChargeProjectBalanceResponse);
  rpc RefundProjectBalance(RefundProjectBalanceRequest) returns (RefundProjectBalanceResponse);
}

// ChargeProjectBalanceRequest debits amount (in currency_id) from project_id's
// balance. external_id makes the charge idempotent: a retry with the same key
// returns the original transaction instead of double-charging.
message ChargeProjectBalanceRequest {
  string project_id = 1;
  double amount = 2;
  string currency_id = 3;
  string creator_id = 4;
  string comment = 5;
  string transaction_type = 6;
  string external_id = 7;
}

message ChargeProjectBalanceResponse {
  string transaction_id = 1;
  double charged_amount = 2;  // amount actually debited, in UZS
  double project_balance = 3; // remaining balance after the charge, in UZS
}

// RefundProjectBalanceRequest credits back a previously charged amount,
// referencing the original charge transaction. Idempotent per transaction_id.
message RefundProjectBalanceRequest {
  string project_id = 1;
  string transaction_id = 2;
  string comment = 3;
}

message RefundProjectBalanceResponse {
  string transaction_id = 1;
  double refunded_amount = 2;
  double project_balance = 3;
}

message GetPricingLimitsRequest {
  string project_id = 1;
}

message GetPricingLimitsResponse {
  repeated ResourceLimit limits = 1;
}

message GetApiCallMonitoringMetricsRequest {
  string project_id = 1;
}

message GetApiCallMonitoringMetricsResponse {
  int64 total_monthly_calls = 1;
  int64 total_last_day_calls = 2;
  repeated MonitoringDailyUsage daily_usage_chart = 3;
}

message MonitoringDailyUsage {
  string date = 1;
  int64 count = 2;
}

message ResourceLimit {
  string type = 1;
  string name = 2;
  string value = 3;
  double price = 4;
}

message UpdateSubscriptionEndDateReq {
  string project_id = 1;
  string end_date = 2;
}

message UpdateSubscriptionEndDateResp {
  string project_id = 1;
  string end_date = 2;
  string status = 3;
}


message CompareFunctionRequest {
  string fare_id = 1;
  string type = 2;
  int32 count = 3;
}

message CompareFunctionResponse {
  bool has_access = 1;
}

// Fare
message Fare {
  string id = 1;
  string name = 2;
  string currency_id = 3;
  double price = 4;
  int32 trial_days = 5;
  int32 disactivate_day = 6;
  string description = 7;
  repeated FareItemPrice fare_item_prices = 8;
  string created_at = 9;
  string updated_at = 10;
  bool is_public = 11;
  Currency currency = 14;
  Subscription subscription = 15;
  string product_type = 16;
}

// FareItemGroup
message FareItemGroup {
  string id = 1;
  string name = 2;
}

// FareItem
message FareItem {
  string id = 1;
  string name = 2;
  string parent_id = 3;
  string info = 4;
  string type = 5;
  FareItemGroup group = 6;
}

// FareItemPrice
message FareItemPrice {
  string id = 1;
  string fare_id = 2;
  string fare_item_id = 3;
  string value = 4;
  double price = 5;
  double over_limit_price = 6;
  FareItem fare_item = 7;
}

// Transaction
message Transaction {
  string id = 1;
  string project_id = 2;
  string creator_id = 3;
  string comment = 4;
  string payment_status = 5;
  double amount = 6;
  string transaction_type = 7;
  string creator_type = 8;
  string currency_id = 9;
  string acceptor_id = 10;
  string fare_id = 11;
  string created_at = 12;
  string accepted_at = 13;
  Currency currency = 14;
  string receipt_file = 15;
  int64 order_id = 16;
  string payment_type = 17;
  string subscription_id = 18;
  Fare fare = 19;
  string project_name = 20;
  string external_id = 21;
  string card_id = 22;
  double rate = 23;
}

// Requests and Responses

// Fare
message CreateFareRequest {
  string name = 1;
  string currency_id = 2;
  double price = 3;
  int32 trial_days = 4;
  int32 disactivate_day = 5;
  string description = 6;
  repeated FareItemPrice fare_item_prices = 7;
  bool is_public = 8;
  Currency currency = 9;
}

message PrimaryKey {
  string id = 1;
  string project_id = 2;
}

message ListRequest {
  int32 limit = 1;
  int32 offset = 2;
  string search = 3;
  string project_id = 4;
  string product_type = 5;
}

message ListFareResponse {
  repeated Fare fares = 1;
  int32 count = 2;
}


// Fare Item
message CreateFareItemRequest {
  string name = 1;
  string parent_id = 2;
  string info = 3;
  string type = 4;
}

message ListFareItemsResponse {
  repeated FareItem fare_items = 1;
  int32 count = 2;
}

// Transactions
message CreateTransactionRequest {
  string project_id = 1;
  string creator_id = 2;
  string comment = 3;
  string payment_status = 4;
  double amount = 5;
  string transaction_type = 6;
  string creator_type = 7;
  string currency_id = 8;
  string acceptor_id = 9;
  string fare_id = 10;
  string receipt_file = 11;
  int64 order_id = 12;
  string payment_type = 13;
  string subscription_id = 14;
  string external_id = 15;
  string card_id = 16;
  double rate = 17;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  int32 count = 2;
}

message LogUsageRequest {
  string project_id = 1;
  int64 count = 2;
  int64 time_range = 3;
  string date_time = 4;
}

message MonthlyRequest {
  string project_id = 1;
  int32 count = 2;
}

message CreateProjectCardRequest {
  string pan = 1;
  string expire = 2;
  string payme_token = 3;
  string project_id = 4;
  string type = 5;
  string external_id = 6;
  bool verify = 7;
}

message ProjectCard {
  string id = 1;
  string pan = 2;
  string expire = 3;
  string payme_token = 4;
  bool verify = 5;
  string project_id = 6;
  string created_at = 7;
  string updated_at = 8;
  string external_id = 9;
  string type = 10;
}

message GetVerifyCodeRequest {
  string pan = 1;
  string expire = 2;
  string project_id = 3;
}

message GetVerifyCodeResponse {
  bool sent = 1;
  string phone = 2;
  int64 wait = 3;
  string project_card_id = 4;
}

message VerifyRequest {
  string project_card_id = 1;
  string code = 2;
  string project_id = 3;
}

message ListProjectCardsResponse {
  repeated ProjectCard project_cards = 1;
  int32 count = 2;
}

message ReceiptPayRequest {
  string project_card_id = 1;
  double amount = 2;
  string project_id = 3;
  string user_id = 4;
}

message ReceiptPayResponse {
  string pan = 1;
  double amount = 2;
  string status = 3;
  string organization = 4;
}

message Subscription {
  string id = 1;
  string project_id = 2;
  string fare_id = 3;
  string status = 4;
  string start_date = 5;
  string end_date = 6;
  string renewal_date = 7;
  string type = 8;
  string discount_id = 9;
  string pending_fare_id = 10;
  string billing_period_code = 11;
  int32 billing_period_months = 12;
  double billing_period_discount_percent = 13;
  bool cancel_at_period_end = 14;
  string canceled_at = 15;
}

message CancelSubscriptionRequest {
  string project_id = 1;
}

message GetProjectBillingStatusRequest {
  string project_id = 1;
}

// GetProjectBillingStatusResponse reports a project's billing health. project_status
// is always populated. low_balance_warning is true only when the project is within
// days_until_renewal <= 10 of its next renewal AND available_funds (balance plus
// credit_limit) cannot cover next_charge; shortfall then holds the missing amount.
message GetProjectBillingStatusResponse {
  string project_status = 1;
  string subscription_status = 2;
  string product_type = 3;
  string renewal_date = 4;
  int32 days_until_renewal = 5;
  double next_charge = 6;
  double project_balance = 7;
  double credit_limit = 8;
  double available_funds = 9;
  double shortfall = 10;
  bool low_balance_warning = 11;
  string currency_code = 12;
}

message BillingPeriod {
  string code = 1;
  string name = 2;
  int32 months = 3;
  double discount_percent = 4;
  bool is_active = 5;
  int32 sort_order = 6;
}

message ListBillingPeriodsRequest {
  string product_type = 1;
}

message ListBillingPeriodsResponse {
  repeated BillingPeriod billing_periods = 1;
}

message CalculatePriceRequest {
  string project_id = 1;
  string fare_id = 2;
  string discount_id = 3;
}

message CalculatePriceResponse {
  double calculated_price = 1;
  double project_balance = 2;
  double credit_limit = 3;
  double discount_percentage = 4;
  string start_date = 5;
  string end_date = 6;
  double currency_rate = 7;
  string renewal_date = 8;
  double calculated_price_without_rate = 9;
}

message Discount {
  string id = 1;
  int32 months = 2;
  double value = 3;
}

message ListDiscountsResponse {
  repeated Discount discounts = 1;
  int32 count = 2;
}

message RecordAiTokenUsageRequest {
  string project_id = 1;
  int32 input_tokens = 2;
  int32 output_tokens = 3;
  string model = 4;
  string description = 5;
  string company_id = 6;
  string product = 7; // "ucode" | "ugen"; empty defaults to "ugen"
  // pack_tokens: how many of (input_tokens + output_tokens) were funded by the
  // company's token pack rather than the fare. Computed by the gateway, which owns
  // the real-time plan/pack split. Excluded from plan day/month metrics.
  int64 pack_tokens = 8;
}

message GetAiTokenUsageMetricsRequest {
  string project_id = 1;
  string company_id = 2;
}

// today/monthly input+output are raw totals (include pack-funded tokens) for
// analytics. *_plan_tokens exclude the pack portion and are what the gateway
// must use for the fare day/month budget; *_pack_tokens are the pack portion.
message GetAiTokenUsageMetricsResponse {
  int64 today_input_tokens = 1;
  int64 today_output_tokens = 2;
  int64 monthly_input_tokens = 3;
  int64 monthly_output_tokens = 4;
  int64 today_plan_tokens = 5;
  int64 monthly_plan_tokens = 6;
  int64 today_pack_tokens = 7;
  int64 monthly_pack_tokens = 8;
}

// Token pack catalog entry (admin-managed, dynamic).
message TokenPack {
  string id = 1;
  string name = 2;
  int64 token_amount = 3;
  double price = 4;
  string currency_id = 5;
  string product_type = 6;
  bool is_active = 7;
  string created_at = 8;
  string updated_at = 9;
  Currency currency = 10;
}

message ListTokenPacksRequest {
  string product_type = 1; // optional filter
  bool only_active = 2;     // when true, exclude inactive packs
}

message ListTokenPacksResponse {
  repeated TokenPack token_packs = 1;
  int32 count = 2;
}

message CreateTokenPackRequest {
  string name = 1;
  int64 token_amount = 2;
  double price = 3;
  string currency_id = 4;
  string product_type = 5;
  bool is_active = 6;
}

message PurchaseTokenPackRequest {
  string company_id = 1;
  string project_id = 2; // project whose balance pays; consumption attribution
  string pack_id = 3;
  string user_id = 4;    // creator of the purchase transaction
}

message PurchaseTokenPackResponse {
  string company_id = 1;
  int64 tokens_added = 2;
  int64 remaining_tokens = 3;
  double charged_amount = 4;
  string transaction_id = 5;
}

message GetTokenPackBalanceRequest {
  string company_id = 1;
}

message GetTokenPackBalanceResponse {
  string company_id = 1;
  int64 remaining_tokens = 2;
}
